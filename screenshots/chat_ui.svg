<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="8"/>
  <!-- Header -->
  <rect y="0" width="800" height="48" fill="#0f3460" rx="8"/>
  <rect y="24" width="800" height="24" fill="#0f3460"/>
  <text x="20" y="30" fill="#eee" font-family="Segoe UI,system-ui,sans-serif" font-size="16" font-weight="600">AI Chat</text>
  <rect x="85" y="18" width="160" height="20" fill="#e94560" rx="10"/>
  <text x="95" y="32" fill="#fff" font-family="Segoe UI,sans-serif" font-size="11">Qwen3.5-3B-Q4_K_M.gguf</text>
  <rect x="255" y="18" width="60" height="20" fill="#2d6a4f" rx="10"/>
  <text x="265" y="32" fill="#fff" font-family="Segoe UI,sans-serif" font-size="11">balanced</text>
  <text x="720" y="32" fill="#888" font-family="Segoe UI,sans-serif" font-size="12">Ready</text>
  <!-- Chat messages -->
  <!-- User message -->
  <rect x="400" y="70" width="370" height="40" fill="#0f3460" rx="12"/>
  <text x="415" y="95" fill="#eee" font-family="Segoe UI,sans-serif" font-size="13">How does llama-server work with GGUF models?</text>
  <!-- Bot message -->
  <rect x="30" y="125" width="500" height="120" fill="#16213e" rx="12"/>
  <text x="45" y="150" fill="#eee" font-family="Segoe UI,sans-serif" font-size="13">llama-server loads GGUF quantized models into memory</text>
  <text x="45" y="170" fill="#eee" font-family="Segoe UI,sans-serif" font-size="13">and exposes an OpenAI-compatible HTTP API. It supports:</text>
  <text x="45" y="195" fill="#ccc" font-family="Segoe UI,sans-serif" font-size="13">• Streaming token generation (SSE)</text>
  <text x="45" y="215" fill="#ccc" font-family="Segoe UI,sans-serif" font-size="13">• Context window management</text>
  <text x="45" y="235" fill="#ccc" font-family="Segoe UI,sans-serif" font-size="13">• Multiple quantization formats (Q4, Q5, Q8...)</text>
  <!-- User message 2 -->
  <rect x="450" y="260" width="320" height="40" fill="#0f3460" rx="12"/>
  <text x="465" y="285" fill="#eee" font-family="Segoe UI,sans-serif" font-size="13">What about model hot-swapping?</text>
  <!-- Bot message 2 -->
  <rect x="30" y="315" width="460" height="80" fill="#16213e" rx="12"/>
  <text x="45" y="340" fill="#eee" font-family="Segoe UI,sans-serif" font-size="13">The server stops the current process, loads the</text>
  <text x="45" y="360" fill="#eee" font-family="Segoe UI,sans-serif" font-size="13">new GGUF file, and waits for /health to return OK.</text>
  <text x="45" y="380" fill="#ccc" font-family="Segoe UI,sans-serif" font-size="13">Conversation history is preserved across switches.</text>
  <!-- Input bar -->
  <rect y="425" width="800" height="50" fill="#16213e"/>
  <rect x="20" y="435" width="620" height="32" fill="#1a1a2e" rx="8"/>
  <text x="35" y="456" fill="#666" font-family="Segoe UI,sans-serif" font-size="13">Type a message...</text>
  <rect x="650" y="435" width="60" height="32" fill="#e94560" rx="8"/>
  <text x="664" y="456" fill="#fff" font-family="Segoe UI,sans-serif" font-size="13">Send</text>
  <rect x="720" y="435" width="60" height="32" fill="#555" rx="8"/>
  <text x="733" y="456" fill="#fff" font-family="Segoe UI,sans-serif" font-size="12">Clear</text>
  <!-- Footer -->
  <rect y="475" width="800" height="25" fill="#16213e"/>
  <text x="20" y="492" fill="#666" font-family="Segoe UI,sans-serif" font-size="11">12 models available</text>
  <text x="200" y="492" fill="#666" font-family="Segoe UI,sans-serif" font-size="11">Model: Qwen3.5-3B-Instruct-Q4_K_M.gguf ▾</text>
</svg>
