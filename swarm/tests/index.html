<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenAIos — Test Suite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 24px;
            line-height: 1.6;
        }
        h1 {
            font-size: 1.6rem;
            color: #58a6ff;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        /* Summary bar */
        .test-summary {
            display: flex;
            gap: 18px;
            align-items: center;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 24px;
        }
        .test-summary.passed { background: #0d2818; border: 1px solid #238636; }
        .test-summary.failed { background: #2d1118; border: 1px solid #da3633; }
        .test-count { color: #3fb950; }
        .test-count.fail { color: #f85149; }
        .test-count.skip { color: #8b949e; }
        .test-time { color: #8b949e; margin-left: auto; }
        /* Suites */
        .test-suite {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .suite-header {
            padding: 10px 16px;
            font-size: 0.95rem;
            border-bottom: 1px solid #30363d;
            cursor: pointer;
            user-select: none;
        }
        .suite-header.passed { color: #3fb950; }
        .suite-header.failed { color: #f85149; }
        .test-row {
            padding: 6px 16px 6px 28px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 0.85rem;
            border-bottom: 1px solid #21262d;
        }
        .test-row:last-child { border-bottom: none; }
        .test-row.passed .test-icon { color: #3fb950; }
        .test-row.failed .test-icon { color: #f85149; }
        .test-row.skipped .test-icon { color: #8b949e; }
        .test-row.skipped .test-name { color: #8b949e; text-decoration: line-through; }
        .test-icon { font-weight: bold; min-width: 16px; }
        .test-name { flex: 1; }
        .test-ms { color: #484f58; font-size: 0.8rem; }
        .test-error {
            color: #f85149;
            background: #2d1118;
            padding: 6px 12px;
            margin: 4px 16px 8px 28px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #loading {
            text-align: center;
            padding: 60px 0;
            color: #58a6ff;
            font-size: 1.1rem;
        }
        #loading .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>🧪 ZenAIos — Test Suite</h1>
    <p class="subtitle">Browser-based TDD tests — unit, integration &amp; monkey/fuzz</p>

    <div id="loading"><span class="spinner"></span> Running tests…</div>
    <div id="test-results"></div>

    <!-- 1. Load project dependencies (pure logic only, no DOM-dependent files) -->
    <script src="../i18n.js"></script>
    <script src="../logic.js"></script>
    <script src="../chat.js"></script>
    <script src="../data-sync.js"></script>

    <!-- 2. Load test framework -->
    <script src="test-runner.js"></script>

    <!-- 3. Load test suites -->
    <script src="test-data.js"></script>
    <script src="test-i18n.js"></script>
    <script src="test-i18n-completeness.js"></script>
    <script src="test-app-logic.js"></script>
    <script src="test-auth.js"></script>
    <script src="test-integration.js"></script>
    <script src="test-integration-advanced.js"></script>
    <script src="test-monkey.js"></script>
    <script src="test-chat.js"></script>
    <script src="test-chat-monkey.js"></script>
    <script src="test-chat-helpers.js"></script>
    <script src="test-datasync.js"></script>
    <script src="test-monkey-async.js"></script>
    <script src="test-swarm.js"></script>
    <script src="test-swarm-post.js"></script>
    <script src="test-swarm-monkey.js"></script>

    <!-- 4. Run all tests -->
    <script>
        (async function () {
            try {
                var results = await TestRunner.runAll();
                document.getElementById('loading').style.display = 'none';
                document.title = (results.failed > 0
                    ? '✗ ' + results.failed + ' FAILED'
                    : '✓ ALL PASSED') + ' — ZenAIos Tests';
            } catch (e) {
                document.getElementById('loading').innerHTML =
                    '<span style="color:#f85149;">Fatal error: ' + e.message + '</span>';
                console.error('Test runner fatal error:', e);
            }
        })();
    </script>
</body>
</html>
